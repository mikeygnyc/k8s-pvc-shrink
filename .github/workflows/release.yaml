name: Automated Release
on:
  push:
    branches:
      - main

jobs:
  bump-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Bump version and push tag'
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # Bumps 0.0.1 if no special prefix is found

      - name: Update Versioned Files
        run: |
          NEW_VER=${{ steps.tag_action.outputs.new_tag }}
          
          # Update the standalone VERSION file
          echo "$NEW_VER" > VERSION
          
          # Update the VERSION variable inside the script
          sed -i "s/^VERSION=\"v.*\"/VERSION=\"$NEW_VER\"/" kubectl-pvc-shrink
          
          # Create/Update Changelog content
          echo "${{ steps.tag_action.outputs.changelog }}" > LATEST_CHANGES.md

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION kubectl-pvc-shrink
          # Avoid infinite loop by using [skip ci]
          git commit -m "chore: bump version to ${{ steps.tag_action.outputs.new_tag }} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_action.outputs.new_tag }}
          body: ${{ steps.tag_action.outputs.changelog }}
          files: |
            kubectl-pvc-shrink
            install.sh