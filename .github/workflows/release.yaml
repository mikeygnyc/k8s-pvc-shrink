name: Automated Release
on:
  push:
    branches:
      - main

jobs:
  # 1. Validation Job: Must pass before any versioning happens
  test:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
      
      - name: Validate YQ Transformations
        run: |
          # Create a dummy PVC to test our yq logic
          echo 'apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: test-pvc
            annotations:
              volume.autoscaler.kubernetes.io/ignore: "true"
          spec:
            resources:
              requests:
                storage: 1Gi' > test.yaml

          # Test the "Staging PVC" transformation
          cat test.yaml | yq ".metadata.name = \"temp\" | del(.status, .metadata.uid, .metadata.resourceVersion, .metadata.creationTimestamp, .spec.volumeName)" > /dev/null
          
          # Test the "Resize" transformation
          cat test.yaml | yq "del(.status, .metadata.uid, .metadata.resourceVersion, .metadata.creationTimestamp, .spec.volumeName) | .spec.resources.requests.storage = \"10Gi\" | .metadata.annotations |= with_entries(select(.key == \"volume.autoscaler.kubernetes.io/ignore\"))" > /dev/null
          
          echo "✅ YQ transformation logic is valid.
  # 2. Release Job: Depends on 'test'
  bump-and-release:
    name: Bump & Release
    needs: test  # <--- THIS IS THE MAGIC LINE
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Bump version and push tag'
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Update Versioned Files
        run: |
          NEW_VER=${{ steps.tag_action.outputs.new_tag }}
          echo "$NEW_VER" > VERSION
          # Update internal variable in the renamed script
          sed -i "s/^VERSION=\"v.*\"/VERSION=\"$NEW_VER\"/" kubectl-pvc-shrink

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION kubectl-pvc-shrink
          git commit -m "chore: bump version to ${{ steps.tag_action.outputs.new_tag }} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_action.outputs.new_tag }}
          body: ${{ steps.tag_action.outputs.changelog }}
          files: |
            kubectl-pvc-shrink
            install.sh